name: Refresh Letterboxd activity

on:
  schedule:
    - cron: "17 9 * * *" # daily; odd minute to avoid the on-the-hour rush
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch most recent watches
        run: node scripts/fetch-activity.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet src/data/people.json; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/people.json
          git commit -m "Refresh Letterboxd activity data"
          git push
